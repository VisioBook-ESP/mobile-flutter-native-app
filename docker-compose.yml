version: '3.8'

services:
  visiobook-mobile:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: visiobook-mobile-dev
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - visiobook-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  visiobook-network:
    driver: bridge
    name: visiobook-network
