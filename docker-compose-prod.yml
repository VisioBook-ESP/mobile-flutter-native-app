version: '3.8'

services:
  visiobook-mobile:
    image: ${DOCKER_REGISTRY:-ghcr.io/visiobook-esp}/mobile-flutter-native-app:${TAG:-latest}
    container_name: visiobook-mobile-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - visiobook-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  visiobook-network:
    external: true
    name: visiobook-network
